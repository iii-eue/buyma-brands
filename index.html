<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f2;
  --surface: #ffffff;
  --surface2: #f0ede8;
  --text: #1a1814;
  --text2: #6b6660;
  --text3: #a09a94;
  --border: #e2ddd8;
  --border2: #ccc8c2;
  --accent: #2c2420;
  --accent2: #8b6f5e;
  --blue-bg: #eef2f8;
  --blue-text: #2a4a7f;
  --green-bg: #eef5ee;
  --green-text: #2a5e2a;
  --amber-bg: #faf3e8;
  --amber-text: #7a4e0a;
  --gray-bg: #f0ede8;
  --gray-text: #6b6660;
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  background: var(--accent);
  padding: 28px 40px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}

.logo-mark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.04em;
}

.logo-sub {
  font-size: 12px;
  font-weight: 300;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 60px;
}

.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
  align-items: center;
}

.search-wrap {
  position: relative;
  flex: 1;
  min-width: 200px;
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  opacity: 0.4;
  pointer-events: none;
}

input[type="text"] {
  width: 100%;
  padding: 11px 14px 11px 40px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
input[type="text"]:focus { border-color: var(--border2); }
input[type="text"]::placeholder { color: var(--text3); }

.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 400;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.meta-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.count-label {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 0.05em;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.15s, box-shadow 0.15s;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
}
.card:hover {
  border-color: var(--border2);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.card.no-link {
  opacity: 0.5;
  cursor: default;
}
.card.no-link:hover {
  border-color: var(--border);
  box-shadow: none;
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}

.card-name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  color: var(--text);
}

.badge {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.03em;
}
.badge-edit { background: var(--blue-bg); color: var(--blue-text); }
.badge-copy { background: var(--green-bg); color: var(--green-text); }
.badge-item { background: var(--amber-bg); color: var(--amber-text); }
.badge-none { background: var(--gray-bg); color: var(--gray-text); }

.card-bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 8px;
}

.card-date {
  font-size: 11px;
  color: var(--text3);
}

.card-note {
  font-size: 11px;
  color: var(--accent2);
  line-height: 1.4;
}

.memo-section {
  margin-top: 10px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

.memo-input {
  width: 100%;
  padding: 7px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  background: var(--surface2);
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text);
  resize: none;
  outline: none;
  min-height: 52px;
  transition: border-color 0.15s, background 0.15s;
  line-height: 1.5;
}
.memo-input:focus {
  background: var(--surface);
  border-color: var(--border2);
}
.memo-input::placeholder { color: var(--text3); }

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 14px;
}

.memo-saved-indicator {
  font-size: 10px;
  color: var(--green-text);
  text-align: right;
  height: 14px;
  transition: opacity 0.3s;
  opacity: 0;
}
.memo-saved-indicator.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">BUYMA</div>
  <div class="logo-sub">Brand Manager</div>
</header>

<div class="main">
  <div class="toolbar">
    <div class="search-wrap">

        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

      <input type="text" id="search" placeholder="ブランド名で検索...">
    </div>
    <div class="filters">

    </div>
  </div>

  <div class="meta-bar">

  </div>

  <div class="grid" id="grid"></div>
</div>

  { name: "VETEMENTS", url: "https://www.buyma.com/my/sell/112857778/edit?tab=b", date: "11/21" },
  { name: "Aesther Ekme", url: "https://www.buyma.com/my/sell/113326347/edit?tab=b", date: "12/4" },
  { name: "UNDERCOVER", url: "https://www.buyma.com/my/sell/130164981/edit?tab=b", date: "" },
];

const MEMO_KEY = "buyma_memos";

function loadMemos() {
  try { return JSON.parse(localStorage.getItem(MEMO_KEY) || "{}"); } catch { return {}; }
}
function saveMemo(name, val) {
  const m = loadMemos();
  m[name] = val;
  localStorage.setItem(MEMO_KEY, JSON.stringify(m));
}

function getType(url) {
  if (!url) return "none";
  if (url.includes("/item/")) return "item";
  if (url.includes("copy_id")) return "copy";
  return "edit";
}

function getBadge(type) {
  return { edit: { label: "編集", cls: "badge-edit" }, copy: { label: "コピー", cls: "badge-copy" }, item: { label: "商品", cls: "badge-item" }, none: { label: "リンクなし", cls: "badge-none" } }[type];
}

let currentFilter = "all";

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const memos = loadMemos();
  const filtered = brands.filter(b => {
    const matchQ = b.name.toLowerCase().includes(q);
    const type = getType(b.url);
    const matchF = currentFilter === "all" || type === currentFilter;
    return matchQ && matchF;
  });

  document.getElementById("count").textContent = filtered.length + " ブランド";

  const grid = document.getElementById("grid");
  if (!filtered.length) {
    grid.innerHTML = '<div class="no-results">該当するブランドが見つかりませんでした</div>';
    return;
  }

  grid.innerHTML = filtered.map(b => {
    const type = getType(b.url);
    const badge = getBadge(type);
    const memo = (memos[b.name] || "").replace(/"/g, "&quot;");
    const inner = `
      <div class="card-top">
        <span class="card-name">${b.name}</span>
        <span class="badge ${badge.cls}">${badge.label}</span>
      </div>
      ${b.note ? `<div class="card-note">${b.note}</div>` : ""}
      <div class="card-bottom">
        <span class="card-date">${b.date || "—"}</span>
      </div>
      <div class="memo-section" onclick="event.stopPropagation(); event.preventDefault();">
        <textarea class="memo-input" placeholder="メモ..." data-brand="${b.name.replace(/"/g, "&quot;")}" rows="2">${memo}</textarea>
        <div class="memo-saved-indicator" id="saved-${CSS.escape(b.name)}">保存しました</div>
      </div>
    `;
    if (b.url) {
      return `<a class="card" href="${b.url}" target="_blank">${inner}</a>`;
    } else {
      return `<div class="card no-link">${inner}</div>`;
    }
  }).join("");

  grid.querySelectorAll(".memo-input").forEach(el => {
    el.addEventListener("input", () => {
      const name = el.dataset.brand;
      saveMemo(name, el.value);
      const ind = document.getElementById("saved-" + CSS.escape(name));
      if (ind) {
        ind.classList.add("show");
        clearTimeout(ind._t);
        ind._t = setTimeout(() => ind.classList.remove("show"), 1500);
      }
    });
    el.addEventListener("click", e => e.preventDefault());
    el.addEventListener("mousedown", e => e.stopPropagation());
  });
}

document.getElementById("search").addEventListener("input", render);
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    render();
  });
});

render();
</script>
</body>
</html>
